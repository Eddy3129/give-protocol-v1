[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
broadcast = "broadcast"
script = "script"

# Solidity configuration
solc = "0.8.34"
evm_version = "prague"
optimizer = true
via_ir = true
ffi = false

# Build configuration for deterministic builds
bytecode_hash = "none"
cbor_metadata = false

# Gas reporting and testing
gas_reports = ["*"]
gas_limit = 100000000

# Fuzzing configuration
fuzz = { runs = 10000, max_test_rejects = 65536, seed = "0x1337" }

# Remappings for node_modules dependencies
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@aave/core-v3/=lib/aave-v3-core/",
    "pendle-core-v2-public/=lib/pendle-core-v2-public/contracts/"
]
fs_permissions = [{ access = "read-write", path = "deployments" }]
[rpc_endpoints]
# Private endpoint (Alchemy/Infura) — set BASE_RPC_URL in .env for higher rate limits.
# Public fallback used automatically by ForkBase.t.sol when BASE_RPC_URL is unset.
#   Public:  https://base-rpc.publicnode.com
#   Alchemy: https://base-mainnet.g.alchemy.com/v2/<YOUR_KEY>
base = "${BASE_RPC_URL}"

[profile.test]
optimizer = true
via_ir = true
optimizer_runs = 200
verbosity = 2

[profile.dev-fast]
optimizer = true
via_ir = true
optimizer_runs = 1
verbosity = 1

[profile.production]
optimizer = true
optimizer_runs = 2000000
via_ir = true
bytecode_hash = "ipfs"
cbor_metadata = true

[profile.coverage]
gas_reports = []
optimizer = false

[invariant]
runs = 256
depth = 500
fail_on_revert = false

# Linting configuration
[lint]
ignored = [
    "mixed-case-variable",     # Allow SCREAMING_SNAKE_CASE for role constants in scripts/tests
    "mixed-case-function",     # Allow __init patterns and _internal helpers
    "pascal-case-struct"       # NGOInfo/NGORegistryState naming is domain-specific and acceptable
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
